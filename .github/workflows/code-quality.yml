name: Code Quality

on:
  pull_request:
    branches:
      - development
      - main
  push:
    branches:
      - development
      - main

permissions:
  contents: write

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Auto-format on pull requests
        if: github.event_name == 'pull_request'
        run: pnpm format

      - name: Commit formatting changes
        if: github.event_name == 'pull_request'
        uses: autofix-ci/action@v1
        with:
          commit_message: "chore: auto-format with Prettier"

      - name: Run quality checks
        run: pnpm quality
